{% extends "base.html" %}
{% block title %}Doar+ | Entrar{% endblock %}

{% block content %}
<div class="flex items-center justify-center px-gutter py-16">
    <div class="w-full max-w-[440px] bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-sm p-8">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold">Bem-vindo de volta</h1>
            <p class="text-on-surface-variant text-sm">Continue sua jornada de impacto social.</p>
        </div>
        <form method="POST" class="flex flex-col gap-4">
            <div>
                <label class="text-xs font-medium text-on-surface-variant block mb-1">Email</label>
                <input type="email" name="email" required class="w-full px-4 py-3 rounded-lg border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all" placeholder="nome@exemplo.com">
            </div>
            <div>
                <label class="text-xs font-medium text-on-surface-variant block mb-1">Senha</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-lg border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all" placeholder="••••••••">
            </div>
            <div class="text-right -mt-2">
                <a href="{{ url_for('esqueci_senha') }}" class="text-xs text-secondary hover:underline">Esqueceu a senha?</a>
            </div>
            <button type="submit" class="w-full bg-primary-container text-on-primary-container font-bold py-3 rounded-lg hover:opacity-90 transition-all">Entrar</button>
        </form>
        <p class="text-center text-sm text-on-surface-variant mt-6">
            Não tem uma conta? <a href="{{ url_for('cadastro') }}" class="text-primary font-bold hover:underline">Criar conta</a>
        </p>
    </div>
</div>
{% endblock %}
